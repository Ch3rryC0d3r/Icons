[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = "localize{type = 'other', key = 'playing_card', set = 'Other', nodes = full_UI_table.name, vars = {localize(specific_vars.value, 'ranks'), localize(specific_vars.suit, 'suits_plural'), colours = {specific_vars.colour}}}"
position = 'before'
match_indent = false
payload = '''
        prep_specific_vars()
'''

[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = "if _c.rarity and _c.rarity == 4 and specific_vars and not specific_vars.not_hidden then "
position = 'before'
match_indent = false
payload = '''
        prep_specific_vars()
'''